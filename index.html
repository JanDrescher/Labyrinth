<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze Of Mages</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <h1>Maze Of Mages</h1>

  <!-- Settings panel -->
  <div id="settings" class="hidden">
    <label class="setting">
      <span class="setting-label">Spalten</span>
      <input id="inp-cols" type="range" min="5" max="80" value="21" />
      <span class="setting-val" id="val-cols">21</span>
    </label>
    <label class="setting">
      <span class="setting-label">Zeilen</span>
      <input id="inp-rows" type="range" min="5" max="80" value="21" />
      <span class="setting-val" id="val-rows">21</span>
    </label>
    <label class="setting">
      <span class="setting-label">Gangbreite&nbsp;(px)</span>
      <input id="inp-cell" type="range" min="4" max="80" value="80" />
      <span class="setting-val" id="val-cell">80</span>
    </label>
    <label class="setting">
      <span class="setting-label">Sichtweite&nbsp;(px)</span>
      <input id="inp-fog" type="range" min="15" max="400" value="120" />
      <span class="setting-val" id="val-fog">120</span>
    </label>
    <label class="setting">
      <span class="setting-label">Überblendung&nbsp;(px)</span>
      <input id="inp-fade" type="range" min="0" max="200" value="150" />
      <span class="setting-val" id="val-fade">150</span>
    </label>
  </div>

  <!-- HUD -->
  <div id="hud">
    <span>Zeit</span>
    <span id="timer">0.0 s</span>
<span>Punkte</span>
    <span id="score">0</span>
    <span>Level</span>
    <span id="level">1</span>
    <button id="btn-new" class="hidden">Neues Labyrinth</button>
    <button id="btn-solution" class="hidden" aria-pressed="false">Lösung zeigen</button>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="spell-bar"></div>
    <canvas id="maze-canvas"></canvas>

    <div id="overlay">
      <p id="overlay-msg">Finde den Ausgang!</p>
      <button onclick="document.getElementById('btn-new').click()">Start</button>
    </div>
  </div>

  <p id="hint">Steuerung: Pfeiltasten &nbsp;/&nbsp; WASD &nbsp;&nbsp;·&nbsp;&nbsp; Spells: Tasten 1–0</p>

  <script type="module" src="js/game.js"></script>
</body>
</html>
