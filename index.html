<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinth</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <h1>Labyrinth</h1>

  <!-- Settings panel -->
  <div id="settings">
    <label class="setting">
      <span class="setting-label">Spalten</span>
      <input id="inp-cols" type="range" min="5" max="80" value="20" />
      <span class="setting-val" id="val-cols">20</span>
    </label>
    <label class="setting">
      <span class="setting-label">Zeilen</span>
      <input id="inp-rows" type="range" min="5" max="80" value="20" />
      <span class="setting-val" id="val-rows">20</span>
    </label>
    <label class="setting">
      <span class="setting-label">Gangbreite&nbsp;(px)</span>
      <input id="inp-cell" type="range" min="4" max="40" value="40" />
      <span class="setting-val" id="val-cell">10</span>
    </label>
    <label class="setting">
      <span class="setting-label">Sichtweite&nbsp;(px)</span>
      <input id="inp-fog" type="range" min="15" max="400" value="120" />
      <span class="setting-val" id="val-fog">80</span>
    </label>
    <label class="setting">
      <span class="setting-label">Überblendung&nbsp;(px)</span>
      <input id="inp-fade" type="range" min="0" max="150" value="100" />
      <span class="setting-val" id="val-fade">40</span>
    </label>
  </div>

  <!-- HUD -->
  <div id="hud">
    <span>Zeit</span>
    <span id="timer">0.0 s</span>
    <span id="size-info">200 × 200 px</span>
    <button id="btn-new">Neues Labyrinth</button>
    <button id="btn-solution" aria-pressed="false">Lösung zeigen</button>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="maze-canvas"></canvas>

    <div id="overlay">
      <p id="overlay-msg">Finde den Ausgang!</p>
      <button onclick="document.getElementById('btn-new').click()">Start</button>
    </div>
  </div>

  <p id="hint">Steuerung: Pfeiltasten &nbsp;/&nbsp; WASD</p>

  <script>
// ── maze.js ──────────────────────────────────────────────────────────────────
class Maze {
  constructor(cols = 20, rows = 20, cell = 10) {
    this.cols = cols;
    this.rows = rows;
    this.cell = cell;

    this.walls = Array.from({ length: rows }, () =>
      Array.from({ length: cols }, () => ({ N: true, E: true, S: true, W: true }))
    );

    this._generate();

    const mid = Math.floor(cols / 2);
    this.walls[rows - 1][mid].S = false;
    this.walls[0][mid].N        = false;
  }

  _generate() {
    const visited = Array.from({ length: this.rows }, () =>
      new Array(this.cols).fill(false)
    );

    const stack = [];
    visited[0][0] = true;
    stack.push([0, 0]);

    while (stack.length > 0) {
      const [r, c]    = stack[stack.length - 1];
      const neighbors = this._unvisitedNeighbors(r, c, visited);

      if (neighbors.length > 0) {
        const [nr, nc, dir] = neighbors[Math.floor(Math.random() * neighbors.length)];
        this._removeWall(r, c, nr, nc, dir);
        visited[nr][nc] = true;
        stack.push([nr, nc]);
      } else {
        stack.pop();
      }
    }
  }

  _unvisitedNeighbors(r, c, visited) {
    const result = [];
    if (r > 0              && !visited[r - 1][c]) result.push([r - 1, c, 'N']);
    if (c < this.cols - 1  && !visited[r][c + 1]) result.push([r, c + 1, 'E']);
    if (r < this.rows - 1  && !visited[r + 1][c]) result.push([r + 1, c, 'S']);
    if (c > 0              && !visited[r][c - 1]) result.push([r, c - 1, 'W']);
    return result;
  }

  _removeWall(r, c, nr, nc, dir) {
    const OPPOSITE = { N: 'S', S: 'N', E: 'W', W: 'E' };
    this.walls[r][c][dir]             = false;
    this.walls[nr][nc][OPPOSITE[dir]] = false;
  }

  draw(ctx) {
    const { cols, rows, cell } = this;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, cols * cell, rows * cell);

    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth   = 1;
    ctx.lineCap     = 'square';

    ctx.beginPath();

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * cell;
        const y = r * cell;
        const w = this.walls[r][c];

        if (w.N) { ctx.moveTo(x,        y); ctx.lineTo(x + cell, y); }
        if (w.W) { ctx.moveTo(x, y);        ctx.lineTo(x, y + cell); }
        if (r === rows - 1 && w.S) { ctx.moveTo(x, y + cell); ctx.lineTo(x + cell, y + cell); }
        if (c === cols - 1 && w.E) { ctx.moveTo(x + cell, y); ctx.lineTo(x + cell, y + cell); }
      }
    }

    ctx.stroke();

    const mid = Math.floor(cols / 2);
    ctx.fillStyle = '#00c853';
    ctx.fillRect(mid * cell + 1, rows * cell - 3, cell - 2, 3);

    ctx.fillStyle = '#d50000';
    ctx.fillRect(mid * cell + 1, 0, cell - 2, 3);
  }

  canMove(r, c, dir) {
    if (r < 0 || r >= this.rows || c < 0 || c >= this.cols) return false;
    return !this.walls[r][c][dir];
  }

  solution() {
    if (this._solution) return this._solution;

    const mid   = Math.floor(this.cols / 2);
    const sr    = this.rows - 1, sc = mid;
    const er    = 0,             ec = mid;

    const key   = (r, c) => r * this.cols + c;
    const prev  = new Map();
    const queue = [[sr, sc]];
    prev.set(key(sr, sc), null);

    const STEP = { N: [-1, 0], S: [1, 0], E: [0, 1], W: [0, -1] };

    outer: while (queue.length > 0) {
      const [r, c] = queue.shift();
      for (const [dir, [dr, dc]] of Object.entries(STEP)) {
        if (this.walls[r][c][dir]) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= this.rows || nc < 0 || nc >= this.cols) continue;
        const k = key(nr, nc);
        if (prev.has(k)) continue;
        prev.set(k, [r, c]);
        if (nr === er && nc === ec) break outer;
        queue.push([nr, nc]);
      }
    }

    const path = [];
    let cur = [er, ec];
    while (cur) {
      path.push(cur);
      cur = prev.get(key(cur[0], cur[1]));
    }
    path.reverse();

    this._solution = path;
    return path;
  }

  drawSolution(ctx) {
    const path = this.solution();
    const { cell } = this;

    ctx.save();
    ctx.strokeStyle = '#e53935';
    ctx.lineWidth   = Math.max(1, cell / 5);
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.globalAlpha = 0.75;

    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
      const [r, c] = path[i];
      const x = (c + 0.5) * cell;
      const y = (r + 0.5) * cell;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

// ── player.js ────────────────────────────────────────────────────────────────
class Player {
  constructor(maze) {
    this.maze   = maze;
    const { cell, cols, rows } = maze;
    const mid   = Math.floor(cols / 2);

    this._cx     = (mid + 0.5) * cell;
    this._cy     = (rows - 0.5) * cell;
    this._speed  = 1.5;
    this._facing = 'N';
    this.onGoal  = null;
    this._done   = false;
  }

  update(heldDirs) {
    if (this._done) return;

    for (const dir of heldDirs) {
      if      (dir === 'N') this._moveY(-this._speed);
      else if (dir === 'S') this._moveY( this._speed);
      else if (dir === 'E') this._moveX( this._speed);
      else if (dir === 'W') this._moveX(-this._speed);
      this._facing = dir;
    }

    if (this._cy < 0) {
      this._done = true;
      if (this.onGoal) this.onGoal();
    }
  }

  draw(ctx) {
    const cell = this.maze.cell;
    const r    = Math.max(2, cell * 0.28);

    const DIR_ANGLE = { N: -Math.PI / 2, S: Math.PI / 2, E: 0, W: Math.PI };
    const angle     = DIR_ANGLE[this._facing];

    ctx.fillStyle = '#1565c0';
    ctx.beginPath();
    ctx.arc(this._cx, this._cy, r, 0, Math.PI * 2);
    ctx.fill();

    const dotR    = Math.max(1, r * 0.28);
    const dotDist = r * 0.48;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.arc(
      this._cx + Math.cos(angle) * dotDist,
      this._cy + Math.sin(angle) * dotDist,
      dotR, 0, Math.PI * 2
    );
    ctx.fill();
  }

  _moveX(dx) {
    const { cell, rows, cols, walls } = this.maze;
    const hw  = cell / 2 - 1;
    const row = Math.floor(this._cy / cell);
    const col = Math.floor(this._cx / cell);

    if (row < 0 || row >= rows || col < 0 || col >= cols) return;

    const newCx = this._cx + dx;

    if (dx > 0) {
      const wallX = (col + 1) * cell;
      if (newCx + hw >= wallX && walls[row][col].E) { this._cx = wallX - hw; return; }
    } else {
      const wallX = col * cell;
      if (newCx - hw <= wallX && walls[row][col].W) { this._cx = wallX + hw; return; }
    }

    this._cx = newCx;
  }

  _moveY(dy) {
    const { cell, rows, cols, walls } = this.maze;
    const hw  = cell / 2 - 1;
    const row = Math.floor(this._cy / cell);
    const col = Math.floor(this._cx / cell);

    if (row < 0 || row >= rows || col < 0 || col >= cols) return;

    const newCy = this._cy + dy;

    if (dy > 0) {
      const wallY = (row + 1) * cell;
      if (newCy + hw >= wallY && (walls[row][col].S || row >= rows - 1)) { this._cy = wallY - hw; return; }
    } else {
      const wallY = row * cell;
      if (newCy - hw <= wallY && walls[row][col].N) { this._cy = wallY + hw; return; }
    }

    this._cy = newCy;
  }
}

// ── game.js ──────────────────────────────────────────────────────────────────
const KEY_DIR = {
  ArrowUp:    'N', KeyW: 'N',
  ArrowRight: 'E', KeyD: 'E',
  ArrowDown:  'S', KeyS: 'S',
  ArrowLeft:  'W', KeyA: 'W',
};

const FOG_COLOR = '13,13,26';

class Game {
  constructor() {
    this.canvas   = document.getElementById('maze-canvas');
    this.ctx      = this.canvas.getContext('2d');
    this.overlay  = document.getElementById('overlay');
    this.msgEl    = document.getElementById('overlay-msg');
    this.timerEl  = document.getElementById('timer');
    this.sizeInfo = document.getElementById('size-info');
    this._wrap    = document.getElementById('canvas-wrap');

    this._heldDirs = new Set();

    this._sliders = {
      cols: { input: document.getElementById('inp-cols'), display: document.getElementById('val-cols') },
      rows: { input: document.getElementById('inp-rows'), display: document.getElementById('val-rows') },
      cell: { input: document.getElementById('inp-cell'), display: document.getElementById('val-cell') },
      fog:  { input: document.getElementById('inp-fog'),  display: document.getElementById('val-fog')  },
      fade: { input: document.getElementById('inp-fade'), display: document.getElementById('val-fade') },
    };

    for (const [key, { input, display }] of Object.entries(this._sliders)) {
      input.addEventListener('input', () => {
        display.textContent = input.value;
        this._updateSizeInfo();
      });
      if (key === 'cols' || key === 'rows' || key === 'cell') {
        input.addEventListener('change', () => this._startNew());
      }
    }

    this._won          = false;
    this._startT       = null;
    this._rafId        = null;
    this._showSolution = false;

    this._btnSolution = document.getElementById('btn-solution');
    this._btnSolution.addEventListener('click', () => {
      this._showSolution = !this._showSolution;
      this._btnSolution.setAttribute('aria-pressed', this._showSolution);
      this._btnSolution.textContent = this._showSolution ? 'Lösung verbergen' : 'Lösung zeigen';
    });

    document.getElementById('btn-new').addEventListener('click', () => this._startNew());

    window.addEventListener('keydown', e => {
      const dir = KEY_DIR[e.code];
      if (!dir) return;
      e.preventDefault();
      this._heldDirs.add(dir);
    });
    window.addEventListener('keyup',  e => { const d = KEY_DIR[e.code]; if (d) this._heldDirs.delete(d); });
    window.addEventListener('blur',   () => this._heldDirs.clear());

    new ResizeObserver(() => this._fitCanvas()).observe(this._wrap);

    this._startNew();
  }

  _settings() {
    return {
      cols: parseInt(this._sliders.cols.input.value, 10),
      rows: parseInt(this._sliders.rows.input.value, 10),
      cell: parseInt(this._sliders.cell.input.value, 10),
      fog:  parseInt(this._sliders.fog.input.value,  10),
      fade: parseInt(this._sliders.fade.input.value, 10),
    };
  }

  _updateSizeInfo() {
    const { cols, rows, cell } = this._settings();
    this.sizeInfo.textContent = `Labyrinth ${cols * cell} × ${rows * cell} px`;
  }

  _fitCanvas() {
    const w = Math.floor(this._wrap.clientWidth  * 0.9);
    const h = Math.floor(this._wrap.clientHeight * 0.9);
    if (w === this.canvas.width && h === this.canvas.height) return;
    this.canvas.width  = w;
    this.canvas.height = h;
  }

  _startNew() {
    this.overlay.classList.add('hidden');
    this._won    = false;
    this._startT = performance.now();
    this._heldDirs.clear();

    this._fitCanvas();
    this._updateSizeInfo();

    const { cols, rows, cell } = this._settings();
    this.maze   = new Maze(cols, rows, cell);
    this.player = new Player(this.maze);
    this.player.onGoal = () => this._win();

    if (this._rafId) cancelAnimationFrame(this._rafId);
    this._loop();
  }

  _win() {
    if (this._won) return;
    this._won  = true;
    const secs = ((performance.now() - this._startT) / 1000).toFixed(1);
    this.msgEl.textContent = `Ziel erreicht! Zeit: ${secs} s`;
    this.overlay.classList.remove('hidden');
  }

  _loop() {
    this._rafId = requestAnimationFrame(() => this._loop());

    if (!this._won) {
      this.timerEl.textContent = ((performance.now() - this._startT) / 1000).toFixed(1) + ' s';
      this.player.update(this._heldDirs);
    }

    this._draw();
  }

  _draw() {
    const ctx = this.ctx;
    const vw  = this.canvas.width;
    const vh  = this.canvas.height;
    const vcx = vw / 2;
    const vcy = vh / 2;
    const px  = this.player._cx;
    const py  = this.player._cy;

    ctx.fillStyle = `rgb(${FOG_COLOR})`;
    ctx.fillRect(0, 0, vw, vh);

    ctx.save();
    ctx.translate(vcx - px, vcy - py);
    this.maze.draw(ctx);
    if (this._showSolution) this.maze.drawSolution(ctx);
    this.player.draw(ctx);
    ctx.restore();

    this._drawFog(ctx, vcx, vcy);
  }

  _drawFog(ctx, cx, cy) {
    const { fog, fade } = this._settings();
    const vw = this.canvas.width;
    const vh = this.canvas.height;

    const g = ctx.createRadialGradient(cx, cy, fog, cx, cy, fog + fade);
    g.addColorStop(0, `rgba(${FOG_COLOR},0)`);
    g.addColorStop(1, `rgba(${FOG_COLOR},1)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, vw, vh);

    ctx.save();
    ctx.fillStyle = `rgb(${FOG_COLOR})`;
    ctx.beginPath();
    ctx.rect(0, 0, vw, vh);
    ctx.arc(cx, cy, fog + fade, 0, Math.PI * 2, true);
    ctx.fill('evenodd');
    ctx.restore();
  }
}

window.addEventListener('DOMContentLoaded', () => new Game());
  </script>
</body>
</html>
